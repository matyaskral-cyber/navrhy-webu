<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklad M+P Král</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0b10;
  --surface: #11131a;
  --border: #252838;
  --text: #e8eaf0;
  --text2: #7a7f96;
  --accent: #3b82f6;
  --accent2: #2563eb;
  --gold: #d4a96a;
  --green: #22c55e;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 360px;
  max-width: 90vw;
  text-align: center;
}
.login-logo { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.login-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.login-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
}
.login-btn:hover { background: var(--accent2); }
.login-error { color: #ef4444; font-size: 12px; margin-top: 10px; display: none; }

/* APP */
.app { display: none; }
.app.active { display: block; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-logo { font-size: 18px; font-weight: 700; color: var(--gold); }
.header-logo span { color: var(--text2); font-size: 12px; font-weight: 400; margin-left: 8px; }
.sync-info { font-size: 11px; color: var(--text2); }
.header-right { display: flex; align-items: center; gap: 8px; }
.btn-small {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.btn-small:hover { border-color: var(--text2); color: var(--text); }
.btn-upload {
  padding: 6px 14px;
  background: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}
.btn-upload:hover { background: var(--accent2); }

.toolbar {
  padding: 16px 24px;
}
.search-input {
  width: 100%;
  max-width: 400px;
  padding: 10px 14px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%237a7f96' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 12px center;
}
.search-input:focus { border-color: var(--accent); }

.table-wrap { padding: 0 24px 40px; overflow: auto; max-height: calc(100vh - 130px); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead { position: sticky; top: 0; z-index: 10; }
th {
  text-align: left;
  padding: 10px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text2);
  font-weight: 600;
  cursor: pointer;
}
th:hover { color: var(--text); }
td {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(37,40,56,.5);
}
tr:hover td { background: rgba(59,130,246,.03); }
.code { color: var(--text2); font-size: 12px; font-family: 'SF Mono', 'Courier New', monospace; }
.qty { font-weight: 600; font-variant-numeric: tabular-nums; }
.qty-zero { color: #ef4444; }

.empty { text-align: center; padding: 60px; color: var(--text2); }
.loading { text-align: center; padding: 60px; color: var(--text2); }

/* Upload overlay */
.upload-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.upload-overlay.active { display: flex; }
.upload-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 480px;
  max-width: 90vw;
  text-align: center;
}
.upload-box h3 { color: var(--gold); margin-bottom: 8px; font-size: 18px; }
.upload-box p { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px 20px;
  cursor: pointer;
  transition: border-color .2s;
  margin-bottom: 16px;
}
.drop-zone:hover, .drop-zone.drag { border-color: var(--accent); }
.drop-zone p { margin: 0; }
.upload-status { font-size: 13px; min-height: 20px; margin-top: 12px; }
.upload-status.ok { color: var(--green); }
.upload-status.err { color: #ef4444; }
.btn-close-upload {
  margin-top: 16px;
  padding: 8px 20px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

@media (max-width: 600px) {
  .header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
  .toolbar { padding: 12px 14px; }
  .table-wrap { padding: 0 6px 20px; }
  td, th { padding: 8px 10px; }
}
</style>
</head>
<body>

<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">M+P Král</div>
    <div class="login-sub">Skladové zásoby</div>
    <input type="text" class="login-input" id="loginUser" placeholder="Uživatel" autocomplete="username">
    <input type="password" class="login-input" id="loginPass" placeholder="Heslo" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Přihlásit</button>
    <div class="login-error" id="loginError">Nesprávné údaje</div>
  </div>
</div>

<div class="app" id="mainApp">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">M+P Král <span>Sklad</span></div>
      <div class="sync-info" id="syncInfo">Načítám...</div>
    </div>
    <div class="header-right">
      <button class="btn-upload" id="btnUpload" style="display:none" onclick="openUpload()">Nahrát Excel</button>
      <button class="btn-small" onclick="doLogout()">Odhlásit</button>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Hledat...">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('kod')">Kód</th>
          <th onclick="sortBy('carovy_kod')">Čárový kód</th>
          <th onclick="sortBy('nazev')">Název</th>
          <th onclick="sortBy('mnozstvi')">Skladem</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4"><div class="loading">Načítám...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Upload modal (admin only) -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-box">
    <h3>Aktualizace skladu</h3>
    <p>Nahraj soubor <strong>Zásoby.xlsx</strong> exportovaný z Pohody<br>(Soubor → Datová komunikace → Export agendy → Excel 2007)</p>
    <div class="drop-zone" id="dropZone">
      <p>Přetáhni sem soubor nebo klikni pro výběr</p>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <div class="upload-status" id="uploadStatus"></div>
    <button class="btn-close-upload" onclick="closeUpload()">Zavřít</button>
  </div>
</div>

<script>
const SB_URL = 'https://yqklnqmcjloxwdtifkjb.supabase.co';
const SB_KEY = 'sb_publishable_gZI-26x3NF4Dc5h-BuOpjg_3Y0n2Um-';

const USERS = {
  'petr': 'b23ba60fc222df288df4c3d3818a430bd14252c2d680f7a18172bc6dc4607d20',
  'odberatel': '4f5eab216f7e73e074e6f2f5cf4e4fcba1ccb9e480d93f215c5ddd3f4a1bb1c6',
};

let data = [], sort = { key: 'nazev', dir: 'asc' }, timer, currentUser = '';

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const h = await sha256(document.getElementById('loginPass').value);
  if (USERS[u] === h) { sessionStorage.setItem('sk', u); currentUser = u; showApp(); }
  else { document.getElementById('loginError').style.display = 'block'; }
}

function doLogout() {
  sessionStorage.removeItem('sk');
  currentUser = '';
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  clearInterval(timer);
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  // Show upload button only for admin
  currentUser = sessionStorage.getItem('sk');
  document.getElementById('btnUpload').style.display = currentUser === 'petr' ? '' : 'none';
  load();
  timer = setInterval(load, 60000);
}

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
if (sessionStorage.getItem('sk')) showApp();

async function load() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/sklad?select=kod,carovy_kod,nazev,mnozstvi&order=nazev.asc`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
    render();
    document.getElementById('syncInfo').textContent = `${data.length} položek`;
  } catch(e) {
    document.getElementById('syncInfo').textContent = 'Chyba načítání';
    if (!data.length) document.getElementById('tbody').innerHTML = '<tr><td colspan="4"><div class="empty">Žádná data</div></td></tr>';
  }
}

document.getElementById('searchInput').addEventListener('input', render);

function sortBy(key) {
  sort = sort.key === key ? { key, dir: sort.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'asc' };
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let d = [...data];
  if (q) d = d.filter(i => (i.nazev||'').toLowerCase().includes(q) || (i.kod||'').toLowerCase().includes(q) || (i.carovy_kod||'').toLowerCase().includes(q));
  d.sort((a,b) => {
    let va = a[sort.key] ?? '', vb = b[sort.key] ?? '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); }
    return va < vb ? (sort.dir==='asc'?-1:1) : va > vb ? (sort.dir==='asc'?1:-1) : 0;
  });
  const body = document.getElementById('tbody');
  if (!d.length) { body.innerHTML = '<tr><td colspan="4"><div class="empty">Nic nenalezeno</div></td></tr>'; return; }
  body.innerHTML = d.map(i => {
    const qty = i.mnozstvi || 0;
    return `<tr>
      <td><span class="code">${esc(i.kod||'-')}</span></td>
      <td><span class="code">${esc(i.carovy_kod||'-')}</span></td>
      <td>${esc(i.nazev||'-')}</td>
      <td><span class="qty ${qty<=0?'qty-zero':''}">${qty}</span></td>
    </tr>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ==========================================
// UPLOAD EXCEL (admin only)
// ==========================================
function openUpload() {
  document.getElementById('uploadOverlay').classList.add('active');
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('uploadStatus').className = 'upload-status';
}

function closeUpload() {
  document.getElementById('uploadOverlay').classList.remove('active');
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) processFile(fileInput.files[0]); });

// Close overlay on background click
document.getElementById('uploadOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeUpload();
});

async function processFile(file) {
  const status = document.getElementById('uploadStatus');
  status.className = 'upload-status';
  status.textContent = 'Zpracovávám soubor...';

  try {
    const arrayBuf = await file.arrayBuffer();
    const wb = XLSX.read(arrayBuf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws);

    if (!rows.length) { status.textContent = 'Soubor je prázdný!'; status.className = 'upload-status err'; return; }

    // Find column names (Pohoda uses: Kód, Čárkód, Název, Stav zásoby)
    const keys = Object.keys(rows[0]);
    const colKod = keys.find(k => /^k[oó]d$/i.test(k));
    const colNazev = keys.find(k => /^n[aá]zev$/i.test(k));
    const colBarcode = keys.find(k => /[čc][aá]rk[oó]d|ean/i.test(k));
    const colQty = keys.find(k => /stav z[aá]sob|mno[zž]stv/i.test(k));

    if (!colKod || !colNazev) {
      status.textContent = `Nenalezeny sloupce Kód/Název. Nalezeno: ${keys.join(', ')}`;
      status.className = 'upload-status err';
      return;
    }

    const items = rows.filter(r => r[colKod]).map(r => ({
      kod: String(r[colKod]).trim(),
      nazev: String(r[colNazev] || '').trim(),
      carovy_kod: r[colBarcode] ? String(r[colBarcode]).trim() : null,
      mnozstvi: colQty ? parseInt(r[colQty]) || 0 : 0,
    }));

    status.textContent = `Nalezeno ${items.length} položek, nahrávám...`;

    // Delete old data
    await fetch(`${SB_URL}/rest/v1/sklad?id=gt.0`, {
      method: 'DELETE',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'return=minimal' }
    });

    // Insert new data
    const resp = await fetch(`${SB_URL}/rest/v1/sklad`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(items)
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    status.textContent = `Hotovo! Nahráno ${items.length} položek.`;
    status.className = 'upload-status ok';

    // Reload table
    await load();

  } catch(e) {
    status.textContent = `Chyba: ${e.message}`;
    status.className = 'upload-status err';
  }
}
</script>
</body>
</html>
