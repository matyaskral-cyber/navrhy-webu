<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklad M+P Král</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0b10;
  --surface: #11131a;
  --border: #252838;
  --text: #e8eaf0;
  --text2: #7a7f96;
  --accent: #3b82f6;
  --accent2: #2563eb;
  --gold: #d4a96a;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 360px;
  max-width: 90vw;
  text-align: center;
}
.login-logo { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.login-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.login-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
}
.login-btn:hover { background: var(--accent2); }
.login-error { color: #ef4444; font-size: 12px; margin-top: 10px; display: none; }

/* APP */
.app { display: none; }
.app.active { display: block; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-logo { font-size: 18px; font-weight: 700; color: var(--gold); }
.header-logo span { color: var(--text2); font-size: 12px; font-weight: 400; margin-left: 8px; }
.sync-info { font-size: 11px; color: var(--text2); }
.btn-logout {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.btn-logout:hover { border-color: var(--text2); color: var(--text); }

.toolbar {
  padding: 16px 24px;
}
.search-input {
  width: 100%;
  max-width: 400px;
  padding: 10px 14px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%237a7f96' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 12px center;
}
.search-input:focus { border-color: var(--accent); }

.table-wrap { padding: 0 24px 40px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text2);
  font-weight: 600;
  cursor: pointer;
  position: sticky;
  top: 53px;
  z-index: 10;
}
th:hover { color: var(--text); }
td {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(37,40,56,.5);
}
tr:hover td { background: rgba(59,130,246,.03); }
.code { color: var(--text2); font-size: 12px; font-family: 'SF Mono', 'Courier New', monospace; }
.qty { font-weight: 600; font-variant-numeric: tabular-nums; }
.qty-zero { color: #ef4444; }

.empty { text-align: center; padding: 60px; color: var(--text2); }
.loading { text-align: center; padding: 60px; color: var(--text2); }

@media (max-width: 600px) {
  .header { padding: 10px 14px; }
  .toolbar { padding: 12px 14px; }
  .table-wrap { padding: 0 6px 20px; }
  td, th { padding: 8px 10px; }
}
</style>
</head>
<body>

<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">M+P Král</div>
    <div class="login-sub">Skladové zásoby</div>
    <input type="text" class="login-input" id="loginUser" placeholder="Uživatel" autocomplete="username">
    <input type="password" class="login-input" id="loginPass" placeholder="Heslo" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Přihlásit</button>
    <div class="login-error" id="loginError">Nesprávné údaje</div>
  </div>
</div>

<div class="app" id="mainApp">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">M+P Král <span>Sklad</span></div>
      <div class="sync-info" id="syncInfo">Načítám...</div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Odhlásit</button>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Hledat...">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('kod')">Kód</th>
          <th onclick="sortBy('carovy_kod')">Čárový kód</th>
          <th onclick="sortBy('nazev')">Název</th>
          <th onclick="sortBy('mnozstvi')">Skladem</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4"><div class="loading">Načítám...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const SB_URL = 'https://yqklnqmcjloxwdtifkjb.supabase.co';
const SB_KEY = 'sb_publishable_gZI-26x3NF4Dc5h-BuOpjg_3Y0n2Um-';

const USERS = {
  'admin': '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9',
  'odberatel': 'a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3',
};

let data = [], sort = { key: 'nazev', dir: 'asc' }, timer;

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const h = await sha256(document.getElementById('loginPass').value);
  if (USERS[u] === h) { sessionStorage.setItem('sk', u); showApp(); }
  else { document.getElementById('loginError').style.display = 'block'; }
}

function doLogout() {
  sessionStorage.removeItem('sk');
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  clearInterval(timer);
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  load();
  timer = setInterval(load, 60000);
}

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
if (sessionStorage.getItem('sk')) showApp();

async function load() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/sklad?select=kod,carovy_kod,nazev,mnozstvi&order=nazev.asc`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
    render();
    document.getElementById('syncInfo').textContent = `${data.length} položek`;
  } catch(e) {
    document.getElementById('syncInfo').textContent = 'Chyba načítání';
    if (!data.length) document.getElementById('tbody').innerHTML = '<tr><td colspan="4"><div class="empty">Žádná data</div></td></tr>';
  }
}

document.getElementById('searchInput').addEventListener('input', render);

function sortBy(key) {
  sort = sort.key === key ? { key, dir: sort.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'asc' };
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let d = [...data];
  if (q) d = d.filter(i => (i.nazev||'').toLowerCase().includes(q) || (i.kod||'').toLowerCase().includes(q) || (i.carovy_kod||'').toLowerCase().includes(q));
  d.sort((a,b) => {
    let va = a[sort.key] ?? '', vb = b[sort.key] ?? '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); }
    return va < vb ? (sort.dir==='asc'?-1:1) : va > vb ? (sort.dir==='asc'?1:-1) : 0;
  });
  const body = document.getElementById('tbody');
  if (!d.length) { body.innerHTML = '<tr><td colspan="4"><div class="empty">Nic nenalezeno</div></td></tr>'; return; }
  body.innerHTML = d.map(i => {
    const qty = i.mnozstvi || 0;
    return `<tr>
      <td><span class="code">${esc(i.kod||'-')}</span></td>
      <td><span class="code">${esc(i.carovy_kod||'-')}</span></td>
      <td>${esc(i.nazev||'-')}</td>
      <td><span class="qty ${qty<=0?'qty-zero':''}">${qty}</span></td>
    </tr>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
