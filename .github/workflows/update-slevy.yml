name: Aktualizace slev

on:
  schedule:
    # Každý den v 6:00 ráno CET (5:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # manuální spuštění

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace závislostí
        run: pip install requests beautifulsoup4

      - name: Spuštění scraperu
        run: python3 slevy/scraper.py

      - name: Commit a push pokud se data změnila
        run: |
          cd slevy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slevy.json
          if git diff --cached --quiet; then
            echo "Žádné změny v datech"
          else
            git commit -m "slevy: automatická aktualizace dat $(date +%d.%m.%Y)"
            git push
          fi
