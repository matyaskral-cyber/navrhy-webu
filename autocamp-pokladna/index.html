<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Zvůle Pokladna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0c1220;
      --card: #1e293b;
      --card-hover: #2d3a4f;
      --green: #22c55e;
      --green-dark: #16a34a;
      --gold: #e8b830;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #334155;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 170px;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1rem; font-weight: 700; }
    .header h1 span { color: var(--green); }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .noci-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px 6px;
    }
    .noci-control button {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
    }
    .noci-control .noci-label {
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 50px;
      text-align: center;
    }
    .noci-control .noci-val {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
    }
    .btn-reset {
      background: var(--red);
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* Button grid */
    .section-label {
      padding: 12px 16px 6px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 6px 16px 12px;
    }
    .pos-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.12s;
      position: relative;
      overflow: hidden;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .pos-btn:active {
      transform: scale(0.95);
      background: var(--green);
      border-color: var(--green);
    }
    .pos-btn.has-qty {
      border-color: var(--green);
      background: rgba(34, 197, 94, 0.1);
    }
    .pos-btn .btn-name {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .pos-btn .btn-price {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
    }
    .pos-btn.has-qty .btn-price { color: var(--green); }
    .pos-btn .btn-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 22px;
      height: 22px;
      border-radius: 7px;
      background: var(--green);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }
    .pos-btn.has-qty .btn-badge { display: flex; }
    .pos-btn .btn-subtotal {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gold);
      display: none;
      margin-top: 2px;
    }
    .pos-btn.has-qty .btn-subtotal { display: block; }

    /* Košík */
    .kosik-section {
      padding: 0 16px;
      margin-top: 4px;
    }
    .kosik-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 4px;
    }
    .kosik-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kosik-qty {
      background: var(--green);
      color: #fff;
      min-width: 26px;
      height: 26px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kosik-name { font-size: 0.85rem; font-weight: 500; }
    .kosik-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kosik-price { font-size: 0.85rem; font-weight: 700; color: var(--gold); }
    .kosik-remove {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: none;
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .total-label { font-size: 0.9rem; color: var(--muted); }
    .total-amount { font-size: 1.6rem; font-weight: 800; color: var(--green); }
    .bottom-buttons {
      display: flex;
      gap: 8px;
    }
    .btn-receipt {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      background: var(--green);
      color: #fff;
    }
    .btn-share {
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card);
      width: 100%;
      max-width: 500px;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .receipt {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      white-space: pre-wrap;
      background: var(--bg);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .modal-actions {
      display: flex;
      gap: 8px;
    }
    .modal-actions button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .btn-copy { background: var(--green); color: #fff; }
    .btn-close-modal { background: var(--bg); color: var(--text); }

    /* Historie */
    .history-section { padding: 0 16px; margin-top: 8px; }
    .history-item {
      background: var(--card);
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-time { font-size: 0.78rem; color: var(--muted); }
    .history-amount { font-weight: 700; color: var(--green); font-size: 0.9rem; }
    .history-detail { font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>Zvůle</span> Pokladna</h1>
    <div class="header-right">
      <div class="noci-control">
        <button onclick="setNoci(-1)">−</button>
        <div class="noci-label"><span class="noci-val" id="nociVal">1</span> noc</div>
        <button onclick="setNoci(1)">+</button>
      </div>
      <button class="btn-reset" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div class="section-label">Osoby</div>
  <div class="btn-grid" id="grid-osoby"></div>

  <div class="section-label">Stany & Vozidla</div>
  <div class="btn-grid" id="grid-vozidla"></div>

  <div class="section-label">Poplatky</div>
  <div class="btn-grid" id="grid-poplatky"></div>

  <div class="section-label">Košík</div>
  <div class="kosik-section" id="kosik"></div>

  <div class="section-label">Historie</div>
  <div class="history-section" id="historie"></div>

  <div class="bottom-bar">
    <div class="total-row">
      <div class="total-label">Celkem</div>
      <div class="total-amount" id="totalAmount">0 Kč</div>
    </div>
    <div class="bottom-buttons">
      <button class="btn-receipt" onclick="showReceipt()">Účtenka</button>
      <button class="btn-share" onclick="shareReceipt()">Sdílet</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="receipt" id="receiptText"></div>
      <div class="modal-actions">
        <button class="btn-copy" onclick="copyReceipt()">Kopírovat</button>
        <button class="btn-close-modal" onclick="document.getElementById('modal').classList.remove('show')">Zavřít</button>
      </div>
    </div>
  </div>

<script>
const CENIK = {
  osoby: [
    { id: 'dospely', name: 'Osoba 15+', price: 100 },
    { id: 'dite', name: 'Dítě 3–15', price: 50 },
    { id: 'zvire', name: 'Zvíře', price: 100 },
  ],
  vozidla: [
    { id: 'stan_maly', name: 'Stan malý', price: 50 },
    { id: 'stan_velky', name: 'Stan velký', price: 100 },
    { id: 'karavan', name: 'Karavan', price: 50 },
    { id: 'obytne_auto', name: 'Obytné auto', price: 100 },
    { id: 'auto', name: 'Auto', price: 100 },
    { id: 'motorka', name: 'Motorka', price: 50 },
    { id: 'elektrina', name: 'Elektřina', price: 150 },
  ],
  poplatky: [
    { id: 'mistni_poplatek', name: 'Rekr. poplatek', price: 20 },
  ]
};

let noci = 1;
let quantities = {};
let hist = JSON.parse(localStorage.getItem('zvule_history') || '[]');

function init() {
  Object.values(CENIK).flat().forEach(item => { quantities[item.id] = 0; });
  renderGrid('grid-osoby', CENIK.osoby);
  renderGrid('grid-vozidla', CENIK.vozidla);
  renderGrid('grid-poplatky', CENIK.poplatky);
  renderHistory();
  updateAll();
}

function renderGrid(containerId, items) {
  document.getElementById(containerId).innerHTML = items.map(item => `
    <div class="pos-btn" id="btn_${item.id}" onclick="changeQty('${item.id}', 1)">
      <div class="btn-badge" id="badge_${item.id}">0</div>
      <div class="btn-name">${item.name}</div>
      <div class="btn-price">${item.price} Kč</div>
      <div class="btn-subtotal" id="sub_${item.id}"></div>
    </div>
  `).join('');
}

function changeQty(id, delta) {
  quantities[id] = Math.max(0, (quantities[id] || 0) + delta);
  updateAll();
}

function setNoci(delta) {
  noci = Math.max(1, noci + delta);
  document.getElementById('nociVal').textContent = noci;
  // update noc label
  const label = document.querySelector('.noci-label');
  label.innerHTML = `<span class="noci-val">${noci}</span> ${noci === 1 ? 'noc' : noci < 5 ? 'noci' : 'nocí'}`;
  updateAll();
}

function updateAll() {
  let total = 0;
  const allItems = Object.values(CENIK).flat();
  allItems.forEach(item => {
    const q = quantities[item.id] || 0;
    const subtotal = q * item.price * noci;
    total += subtotal;

    const btn = document.getElementById('btn_' + item.id);
    const badge = document.getElementById('badge_' + item.id);
    const sub = document.getElementById('sub_' + item.id);

    badge.textContent = q;
    btn.classList.toggle('has-qty', q > 0);
    sub.textContent = q > 0 ? subtotal + ' Kč' : '';
  });

  document.getElementById('totalAmount').textContent = total.toLocaleString('cs') + ' Kč';
  renderKosik();
}

function renderKosik() {
  const el = document.getElementById('kosik');
  const allItems = Object.values(CENIK).flat();
  const active = allItems.filter(item => quantities[item.id] > 0);

  if (active.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:8px 0;">Klikněte na položku pro přidání</div>';
    return;
  }

  el.innerHTML = active.map(item => {
    const q = quantities[item.id];
    const subtotal = q * item.price * noci;
    return `<div class="kosik-item">
      <div class="kosik-left">
        <div class="kosik-qty">${q}</div>
        <div class="kosik-name">${item.name}</div>
      </div>
      <div class="kosik-right">
        <div class="kosik-price">${subtotal} Kč</div>
        <button class="kosik-remove" onclick="changeQty('${item.id}', -1)">−</button>
      </div>
    </div>`;
  }).join('');
}

function getReceiptText() {
  const now = new Date();
  const date = now.toLocaleDateString('cs-CZ');
  const time = now.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
  let lines = [];
  lines.push('================================');
  lines.push('    AUTOCAMP ZVŮLE');
  lines.push('================================');
  lines.push(`Datum: ${date}  ${time}`);
  lines.push(`Nocí:  ${noci}`);
  lines.push('--------------------------------');

  let total = 0;
  Object.values(CENIK).flat().forEach(item => {
    const q = quantities[item.id] || 0;
    if (q > 0) {
      const subtotal = q * item.price * noci;
      total += subtotal;
      const label = `${q}x ${item.name}`;
      const price = `${subtotal} Kč`;
      lines.push(label.padEnd(24) + price.padStart(8));
      if (noci > 1) lines.push(`   ${q} × ${item.price} Kč × ${noci} nocí`);
    }
  });

  lines.push('--------------------------------');
  lines.push(`CELKEM`.padEnd(24) + `${total.toLocaleString('cs')} Kč`.padStart(8));
  lines.push('================================');
  lines.push('Děkujeme za návštěvu!');
  lines.push('www.zvule.cz');
  return { text: lines.join('\n'), total };
}

function showReceipt() {
  const { text } = getReceiptText();
  document.getElementById('receiptText').textContent = text;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e.target === e.currentTarget) document.getElementById('modal').classList.remove('show');
}

function saveToHistory(total) {
  hist.unshift({ time: new Date().toISOString(), total, noci, items: { ...quantities } });
  if (hist.length > 50) hist.pop();
  localStorage.setItem('zvule_history', JSON.stringify(hist));
  renderHistory();
}

function copyReceipt() {
  const { text, total } = getReceiptText();
  navigator.clipboard.writeText(text).then(() => {
    saveToHistory(total);
    document.getElementById('modal').classList.remove('show');
    resetAll();
  });
}

function shareReceipt() {
  const { text, total } = getReceiptText();
  if (navigator.share) {
    navigator.share({ title: 'Účtenka Zvůle', text });
    saveToHistory(total);
  } else {
    showReceipt();
  }
}

function renderHistory() {
  const el = document.getElementById('historie');
  if (hist.length === 0) {
    el.innerHTML = '<div class="history-item"><span class="history-time">Zatím žádné účtenky</span></div>';
    return;
  }
  el.innerHTML = hist.slice(0, 20).map(h => {
    const d = new Date(h.time);
    const dateStr = d.toLocaleDateString('cs-CZ');
    const timeStr = d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
    const itemCount = Object.values(h.items).reduce((a, b) => a + b, 0);
    return `<div class="history-item">
      <div>
        <div class="history-time">${dateStr} ${timeStr}</div>
        <div class="history-detail">${h.noci} ${h.noci === 1 ? 'noc' : h.noci < 5 ? 'noci' : 'nocí'} · ${itemCount} pol.</div>
      </div>
      <div class="history-amount">${h.total.toLocaleString('cs')} Kč</div>
    </div>`;
  }).join('');
}

function resetAll() {
  noci = 1;
  document.getElementById('nociVal').textContent = 1;
  document.querySelector('.noci-label').innerHTML = '<span class="noci-val">1</span> noc';
  Object.keys(quantities).forEach(k => quantities[k] = 0);
  updateAll();
}

init();
</script>

</body>
</html>
